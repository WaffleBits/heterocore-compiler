name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[onnx]"
      - run: python -m unittest discover -s tests
      - run: heterocore-compile examples/tiny_transformer.json -o build/tiny_transformer.plan.json
      - run: >
          heterocore-compile examples/tiny_char_transformer.onnx
          -o build/tiny_char_transformer.plan.json
          --onnx-weight-bits 4
          --minimum-analog-macs 16000
      - run: >
          python tools/run_energy_sensitivity.py
          examples/tiny_char_transformer.onnx
          -o build/energy_sensitivity.json
